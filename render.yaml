

services:
  - type: web
    name: civix-backend
    runtime: node
    plan: free
    region: singapore   

    rootDir: backend

    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health


    buildFilter:
      paths:
        - backend/**/*

    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

